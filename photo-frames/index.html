<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Frames | Shree Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#0f0f0f;
color:#eee;
overflow-x:hidden;
}

/* HEADER */
header{
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
padding:20px;
text-align:center;
border-bottom:1px solid rgba(212,175,55,0.2);
position:sticky;
top:0;
z-index:100;
}

header h1{
font-family:'Playfair Display',serif;
color:#d4af37;
font-size:34px;
}

header p{
color:#aaa;
font-size:12px;
margin-top:5px;
}

/* NAVBAR */
.menu-toggle{
display:none;
font-size:26px;
color:#d4af37;
cursor:pointer;
margin-top:10px;
}

.navbar ul{
display:flex;
justify-content:flex-start;
list-style:none;
padding-left:20px;
flex-wrap:wrap;
}

.navbar li{margin:0 15px;}

.navbar a{
color:#eee;
text-decoration:none;
font-size:14px;
}

.navbar a:hover{
color:#d4af37;
}

/* MOBILE */
@media(max-width:768px){
.menu-toggle{display:block;}

.navbar ul{
display:none;
flex-direction:column;
background:#111;
position:absolute;
left:0;
top:100%;
width:100%;
padding:15px;
}

.navbar ul.show{
display:flex;
}

.navbar li{
margin:8px 0;
}

header h1{
font-size:28px;
}
}

/* SEARCH */
.search-box{
text-align:center;
padding:25px 20px 15px;
}

.search-box input{
width:90%;
max-width:420px;
padding:14px;
border:none;
border-radius:30px;
font-size:15px;
outline:none;
}

/* FILTER */
.filters{
text-align:center;
padding:0 15px 20px;
}

.filters button{
margin:5px;
padding:10px 16px;
border:none;
border-radius:25px;
background:#222;
color:#fff;
cursor:pointer;
transition:0.3s;
}

.filters button:hover{
transform:translateY(-2px);
}

.filters button.active{
background:#d4af37;
color:#111;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:22px;
padding:20px;
max-width:1300px;
margin:auto;
}

/* CARD */
.card{
background:#111;
border-radius:18px;
overflow:hidden;
border:1px solid rgba(212,175,55,0.18);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 16px 35px rgba(0,0,0,0.45);
}

.card img{
width:100%;
height:210px;
object-fit:cover;
}

.card-content{
padding:16px;
}

.card h3{
color:#d4af37;
font-size:22px;
margin-bottom:8px;
}

.card p{
font-size:13px;
color:#ccc;
line-height:1.6;
margin-bottom:10px;
}

.card ul{
padding-left:18px;
font-size:12px;
color:#bbb;
margin-bottom:10px;
line-height:1.8;
}

.price{
font-weight:700;
margin-bottom:12px;
color:#98e198;
}

.btn{
display:block;
text-align:center;
padding:11px;
border-radius:30px;
background:#25D366;
color:#fff;
text-decoration:none;
font-weight:600;
cursor:pointer;
border:none;
width:100%;
}

/* MODAL */
.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.82);
z-index:9999;
padding:20px;
overflow:auto;
}

.modal-content{
background:#111;
max-width:460px;
margin:40px auto;
padding:22px;
border-radius:18px;
border:1px solid rgba(212,175,55,0.25);
}

.close{
float:right;
font-size:28px;
cursor:pointer;
color:#d4af37;
}

.modal img{
width:100%;
height:230px;
object-fit:cover;
border-radius:12px;
margin-bottom:14px;
}

.modal h2{
color:#d4af37;
margin-bottom:10px;
}

.modal p{
color:#ccc;
font-size:14px;
line-height:1.7;
margin-bottom:12px;
}

.modal ul{
padding-left:18px;
color:#bbb;
font-size:13px;
line-height:1.8;
margin-bottom:14px;
}

/* FOOTER */
footer{
text-align:center;
padding:25px;
color:#aaa;
border-top:1px solid rgba(212,175,55,0.18);
margin-top:30px;
}

/* FLOAT */
.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:22px;
}
</style>
</head>

<body>

<header>

<h1>Shree Collection | श्री कलेक्शन</h1>
<p>Premium Gifts • Decor • Party Essentials</p>

<div class="menu-toggle" onclick="toggleNav()">☰</div>

<nav class="navbar">
<ul>
<li><a href="/">Home</a></li>
<li><a href="/gift-items/">Gift Items</a></li>
<li><a href="/tools/gift-generator/">Smart Gift Finder</a></li>
<li><a href="/#products">🎁 Products</a></li>
<li><a href="/#order">🛒 Order</a></li>
</ul>
</nav>

</header>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="search" placeholder="Search frames...">
</div>

<!-- FILTER -->
<div class="filters">
<button class="active" onclick="filterProducts('all',this)">All</button>
<button onclick="filterProducts('custom',this)">Spiritual</button>
<button onclick="filterProducts('crystal',this)">Premium</button>
</div>

<!-- PRODUCTS -->
<div class="grid" id="productGrid"></div>

<!-- MODAL -->
<div class="modal" id="productModal">
<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<img id="modalImg">

<h2 id="modalTitle"></h2>

<p id="modalDesc"></p>

<ul id="modalFeatures"></ul>

<div class="price" id="modalPrice"></div>

<button id="modalBtn" class="btn">Order on WhatsApp</button>

</div>
</div>

<footer>
<p>© 2026 Shree Collection</p>
</footer>

<a class="whatsapp" href="https://wa.me/919886901584">💬</a>

<script>
function toggleNav(){
document.querySelector(".navbar ul").classList.toggle("show");
}

let allProducts = [];

/* LOAD JSON */
fetch("products.json")
.then(res => res.json())
.then(data=>{
allProducts = data;
renderProducts(allProducts);
});

/* RENDER PRODUCTS */
function renderProducts(products){

let grid = document.getElementById("productGrid");
grid.innerHTML = "";

if(products.length === 0){
grid.innerHTML = "<p style='text-align:center;width:100%;'>No products found.</p>";
return;
}

products.forEach(product=>{

let features = "";
product.features.forEach(item=>{
features += `<li>✔ ${item}</li>`;
});

grid.innerHTML += `
<div class="card">

<img src="${product.image}" alt="${product.name}">

<div class="card-content">

<h3>${product.name}</h3>

<p>${product.description}</p>

<ul>${features}</ul>

<div class="price">${product.price}</div>

<button class="btn"
onclick='openModal(
"${product.name}",
"${product.image}",
"${product.description}",
"${product.price}",
${JSON.stringify(product.features)}
)'>
View Details
</button>

</div>

</div>
`;

});

}

/* FILTER */
function filterProducts(category,btn){

document.querySelectorAll(".filters button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

if(category === "all"){
renderProducts(allProducts);
return;
}

let filtered = allProducts.filter(p => p.category === category);
renderProducts(filtered);
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){

let value = this.value.toLowerCase();

let filtered = allProducts.filter(p =>
p.name.toLowerCase().includes(value) ||
p.description.toLowerCase().includes(value)
);

renderProducts(filtered);

});

/* MODAL */
function openModal(title,img,desc,price,features){

document.getElementById("modalTitle").innerText = title;
document.getElementById("modalImg").src = img;
document.getElementById("modalDesc").innerText = desc;
document.getElementById("modalPrice").innerText = price;

let list = "";
features.forEach(f=>{
list += `<li>${f}</li>`;
});

document.getElementById("modalFeatures").innerHTML = list;

document.getElementById("modalBtn").onclick = function(){
let msg = `I want to order: ${title}`;
window.open(`https://wa.me/919886901584?text=${encodeURIComponent(msg)}`);
};

document.getElementById("productModal").style.display = "block";
}

function closeModal(){
document.getElementById("productModal").style.display = "none";
}

window.onclick = function(e){
if(e.target.id === "productModal"){
closeModal();
}
}
</script>

</body>
</html>
