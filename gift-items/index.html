
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Shop | Shree Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:#eee;
}

/* HEADER */
header{
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(212,175,55,0.2);
    position:sticky;
    top:0;
    z-index:100;
}

header h1{
    font-family:'Playfair Display',serif;
    color:#d4af37;
}

header p{
    color:#aaa;
    font-size:12px;
}

/* NAVBAR */
.menu-toggle{
    display:none;
    font-size:26px;
    color:#d4af37;
    cursor:pointer;
}

.navbar ul{
    display:flex;
    justify-content:flex-start;
    list-style:none;
    padding-left:20px;
}

.navbar li{margin:0 15px;}

.navbar a{
    color:#eee;
    text-decoration:none;
}

.navbar a:hover{color:#d4af37;}

/* MOBILE */
@media(max-width:768px){
    .menu-toggle{display:block;}

    .navbar ul{
        flex-direction:column;
        background:#111;
        position:absolute;
        top:100%;
        left:0;
        width:100%;
        display:none;
        padding:15px;
    }

    .navbar ul.show{display:flex;}
}

/* SEARCH */
.search-box{text-align:center;margin:20px;}
.search-box input{
    padding:10px;
    width:80%;
    max-width:400px;
    border-radius:25px;
    border:none;
}

/* FILTER */
.filters{text-align:center;margin-bottom:20px;}
.filters button{
    margin:5px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    background:#222;
    color:#fff;
}
.filters button.active{
    background:#d4af37;
    color:black;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#111;
    border-radius:15px;
    overflow:hidden;
    border:1px solid rgba(212,175,55,0.2);
    transition:0.3s;
}

.card:hover{transform:translateY(-8px);}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{padding:15px;}

.card h3{color:#d4af37;}

.price{margin:10px 0;font-weight:bold;}

.btn{
    display:block;
    text-align:center;
    padding:10px;
    border-radius:25px;
    background:#25D366;
    color:white;
    text-decoration:none;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    color:#aaa;
    border-top:1px solid rgba(212,175,55,0.2);
}

/* WHATSAPP FLOAT */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
}
</style>
</head>

<body>

<header>
<h1>Shree Collection</h1>
<p>Premium Gifts • Decor • Party Essentials</p>

<div class="menu-toggle" onclick="toggleNav()">☰</div>

<nav class="navbar">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="index.html#products">Products</a></li>
<li><a href="index.html#party">Party</a></li>
<li><a href="index.html#stores">Stores</a></li>
</ul>
</nav>
</header>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="search" placeholder="Search gifts...">
</div>

<!-- FILTER -->
<div class="filters">
<button onclick="filterProducts('all')" class="active">All</button>
<button onclick="filterProducts('personalized')">Personalized</button>
<button onclick="filterProducts('luxury')">Luxury</button>
<button onclick="filterProducts('romantic')">Romantic</button>
<button onclick="filterProducts('fun')">Fun</button>
</div>

<!-- PRODUCTS -->
<div class="grid" id="productGrid">

<div class="card" data-category="personalized">
<img src="https://images.unsplash.com/photo-1607083206968-13611e3d76db">
<div class="card-content">
<h3>Custom Photo Frame</h3>
<div class="price">₹499</div>
<a class="btn" onclick="order('Custom Photo Frame')">Order on WhatsApp</a>
</div>
</div>

<div class="card" data-category="luxury">
<img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da">
<div class="card-content">
<h3>Premium Gift Hamper</h3>
<div class="price">₹1499</div>
<a class="btn" onclick="order('Premium Gift Hamper')">Order on WhatsApp</a>
</div>
</div>

<div class="card" data-category="romantic">
<img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659">
<div class="card-content">
<h3>Couple Gift Box</h3>
<div class="price">₹999</div>
<a class="btn" onclick="order('Couple Gift Box')">Order on WhatsApp</a>
</div>
</div>

<div class="card" data-category="fun">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
<div class="card-content">
<h3>Funny Mug</h3>
<div class="price">₹299</div>
<a class="btn" onclick="order('Funny Mug')">Order on WhatsApp</a>
</div>
</div>

</div>

<footer>
<p>© 2026 Shree Collection</p>
</footer>

<a class="whatsapp" href="https://wa.me/919886901584">💬</a>

<script>
function toggleNav(){
    document.querySelector(".navbar ul").classList.toggle("show");
}

function filterProducts(category){
    let cards=document.querySelectorAll('.card');
    let buttons=document.querySelectorAll('.filters button');

    buttons.forEach(btn=>btn.classList.remove('active'));
    event.target.classList.add('active');

    cards.forEach(card=>{
        if(category==="all" || card.dataset.category===category){
            card.style.display="block";
        } else {
            card.style.display="none";
        }
    });
}

document.getElementById("search").addEventListener("keyup", function(){
    let value=this.value.toLowerCase();
    let cards=document.querySelectorAll('.card');

    cards.forEach(card=>{
        let text=card.innerText.toLowerCase();
        card.style.display=text.includes(value) ? "block" : "none";
    });
});

function order(product){
    let msg=`I want to order: ${product}`;
    window.open(`https://wa.me/919886901584?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
