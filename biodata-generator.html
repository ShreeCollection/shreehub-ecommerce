/* HEADER INSIDE BIODATA */

  text-align:center;

  margin-bottom:20px;

.header h3{color:#d4af37;}

.navbar{

.navbar ul{
  display:flex;
  justify-content:flex-start;

  flex-wrap:wrap;

.row{display:flex;margin:12px 0;}
.label{width:150px;font-weight:500;}

  width:180px;

  border:3px solid currentColor;

.photo-box img{

/* FOOTER INSIDE BIODATA */
.footer{
  margin-top:20px;
  text-align:center;
  font-size:12px;
  opacity:0.8;

/* WEBSITE FOOTER */
footer{
  text-align:center;

  color:#aaa;
  border-top:1px solid rgba(212,175,55,0.2);

  background:linear-gradient(#7a0c0c,#3a0606);

<body>

<header>

<h1>Shree Collection | श्री कलेक्शन</h1>
<h4>Biodata Generator Tool</h4>
<p>Create and download your marriage biodata in minutes</p>

<nav class="navbar">
<ul>

<li><a href="index.html">Home</a></li>
<li class="dropdown">
<a href="#" onclick="toggleMenu(event)">Tools ▾</a>

<div class="dropdown-menu" id="dropdownMenu">
<a href="biodata-generator.html">Biodata Generator</a>
</div>

</li>

</ul>
</nav>

</header>

<div class="main-container">

<div class="form">


<label style="font-size:13px;margin-bottom:5px;display:block;color:#d4af37;">
🎨 Select Design
</label>

<select id="templateSelect">
<option value="royal-red">Royal Red</option>
<option value="royal-gold">Royal Gold</option>
<option value="maharaja">Maharaja</option>
<option value="temple">Temple</option>
<option value="floral">Floral</option>
<option value="minimal">Minimal</option>
<option value="modern-dark">Modern Dark</option>
<option value="pastel">Pastel</option>
<option value="elegant">Elegant</option>
<option value="blue">Blue</option>
</select>

<label style="font-size:13px;margin-top:10px;display:block;color:#d4af37;">
📷 Upload Profile Image
</label>

<input type="file" id="photo">

<div id="fields"></div>

<!-- Add Field -->
<button onclick="addField()">+ Add Field</button><br>

<!-- Actions -->

<button onclick="downloadPDF()">Download PDF</button>
<button onclick="downloadImage()">Download Image</button>

</div>

<div class="preview">

<div id="biodata" class="biodata">

<div class="inner">

<div class="header">ॐ श्री गणेशाय नमः</div>

<div class="content" id="content">

<div class="details">
<div id="basic"></div>

<div class="section-title">Family Details</div>
<div id="family"></div>

<div class="section-title">Contact Details</div>
<div id="contact"></div>
</div>

<div class="photo-box">
<img id="previewPhoto">
</div>

</div>

</div>

</div>

</div>

</div>

<footer>
<p>© 2026 Shree Collection</p>
</footer>

<script>

/* DATE */
function setFooterDate(){
  const d=new Date();
  footerDate.innerText="Date: "+d.toLocaleDateString();
}

/* DEFAULT FIELDS */
const defaultFields=[
["Name","basic"],["Date of Birth","basic"],["Time Of Birth","basic"],
["Place Of Birth","basic"],["Height","basic"],["Weight","basic"],
["Complexion","basic"],["Caste","basic"],["Gotra","basic"],
["Education","basic"],["Occupation","basic"],["Languages","basic"],
["Hobby","basic"],
["Father's Name","family"],["Father's Occupation","family"],
["Mother's Name","family"],["Mother's Occupation","family"],
["Phone","contact"],["Address","contact"],["Email","contact"]
];

window.onload=init;

function init(){
  fields.innerHTML="";
  defaultFields.forEach(f=>createField(f[0],f[1]));

  // Load saved template
  const saved=localStorage.getItem("template") || "blue";
  templateSelect.value=saved;
  biodata.className="biodata template-"+saved;

  loadPhoto();
  update();
  setFooterDate();
}

/* CREATE FIELD */
function createField(label,section){
  const div=document.createElement("div");
  div.className="field";
  div.innerHTML=`
    <input value="${label}">
    <textarea></textarea>
    <select>
      <option value="basic" ${section==="basic"?"selected":""}>Basic</option>
      <option value="family" ${section==="family"?"selected":""}>Family</option>
      <option value="contact" ${section==="contact"?"selected":""}>Contact</option>
    </select>
  `;
  fields.appendChild(div);
}

function addField(){createField("New Field","basic");}

/* LIVE UPDATE */
document.addEventListener("input",update);

function update(){
  basic.innerHTML="";family.innerHTML="";contact.innerHTML="";
  document.querySelectorAll(".field").forEach(f=>{
    const l=f.children[0].value;
    const v=f.children[1].value.replace(/\n/g,"<br>");
    const s=f.children[2].value;
    if(l&&v){
      const row=`<div class="row">
        <div class="label">${l}</div>
        <div class="colon">:</div>
        <div class="value">${v}</div>
      </div>`;
      if(s==="basic") basic.innerHTML+=row;
      if(s==="family") family.innerHTML+=row;
      if(s==="contact") contact.innerHTML+=row;
    }
  });
}

function toggleMenu(e){
  e.preventDefault();
  document.getElementById("dropdownMenu").classList.toggle("show");
}

// close dropdown when clicking outside
window.addEventListener("click", function(e){
  if (!e.target.closest(".dropdown")){
    document.getElementById("dropdownMenu").classList.remove("show");
  }
});

/* TEMPLATE SWITCH */
templateSelect.onchange=()=>{
  const val=templateSelect.value;
  biodata.className="biodata template-"+val;
  localStorage.setItem("template",val);
};

/* PHOTO */
photo.onchange=e=>{
  const r=new FileReader();
  r.onload=e=>{
    previewPhoto.src=e.target.result;
    localStorage.setItem("photo",e.target.result);
  };
  r.readAsDataURL(e.target.files[0]);
};

function loadPhoto(){
  const p=localStorage.getItem("photo");
  if(p) previewPhoto.src=p;
}

/* PDF */
async function downloadPDF(){
  const {jsPDF}=window.jspdf;
  const canvas=await html2canvas(biodata,{scale:3});
  const img=canvas.toDataURL("image/png");
  const pdf=new jsPDF("p","mm","a4");
  pdf.addImage(img,"PNG",0,0,210,297);
  pdf.save("biodata.pdf");
}

/* IMAGE */
function downloadImage(){
  html2canvas(biodata,{scale:2}).then(canvas=>{
    const link=document.createElement("a");
    link.download="biodata.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

</script>

<div class="footer">
<p>✨ Designed by Shree Collection ✨</p>
</div>
</body>
