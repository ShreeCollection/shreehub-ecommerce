<body>

<header>
<div class="navbar">
<a href="/" class="logo">Shree<span>Hub</span></a>

<ul>

<li><a href="/services/">Services</a></li>
<li><a href="/contact/">Contact</a></li>
</ul>
</nav>
</div>
</header>

<div class="container">

<section class="hero">
<h1><span>Rotate</span> PDF</h1>
<p class="sub">
Rotate all pages or selected pages by 90°, 180°, or 270° instantly.
</p>
</section>

<div class="card">

<label class="upload">
<input type="file" id="pdfFile" accept="application/pdf">
📄 Click Here to Upload PDF File
</label>

<div class="grid">

<div>
<label>Rotation Angle</label>
<select id="angle" onchange="updatePreview()">
<option value="90">90° Clockwise</option>
<option value="180">180°</option>
<option value="270">270° Clockwise</option>
</select>
</div>

<div>
<label>Apply To</label>
<select id="mode">
<option value="all">All Pages</option>
<option value="selected">Selected Pages</option>
</select>
</div>

</div>

<label>Selected Pages (Example: 1,3,5)</label>
<input type="text" id="pagesInput" placeholder="1,3,5">

<div class="toolbar">
<button class="btn primary" onclick="rotatePDF()">🔄 Rotate PDF</button>
<button class="btn dark" onclick="resetTool()">♻️ Reset</button>
</div>

<div class="preview">

<div class="box">
<div class="sheet" id="sheet1"></div>
<p>Before</p>
</div>

<div class="box">
<div class="sheet" id="sheet2"></div>
<p>After</p>
</div>

<div class="box">
<div class="sheet" id="sheet3"></div>
<p>Download Ready</p>
</div>

</div>

<div class="status" id="status"></div>

<p class="note">
Useful for scanned pages, sideways PDFs, phone camera documents and upside-down pages.
</p>

</div>

<footer>
© 2026 ShreeHub Rotate PDF Tool
</footer>

</div>

<script>
let uploadedFile = null;

const input = document.getElementById("pdfFile");
const statusBox = document.getElementById("status");

input.addEventListener("change", function(){

uploadedFile = this.files[0];

if(uploadedFile){
showStatus("PDF uploaded successfully.");
}

});

function showStatus(text){
statusBox.style.display = "block";
statusBox.innerText = text;
}

function parsePages(text,total){

const set = new Set();

text.split(",").forEach(part=>{

const n = parseInt(part.trim());

if(n >= 1 && n <= total){
set.add(n);
}

});

return [...set];

}

function updatePreview(){

const angle = document.getElementById("angle").value;

document.getElementById("sheet1").style.transform = "rotate(0deg)";
document.getElementById("sheet2").style.transform = "rotate(" + angle + "deg)";
document.getElementById("sheet3").style.transform = "rotate(" + angle + "deg) scale(.95)";

}

async function rotatePDF(){

if(!uploadedFile){
showStatus("Please upload a PDF file first.");
return;
}

try{

showStatus("Rotating PDF... Please wait.");

const bytes = await uploadedFile.arrayBuffer();

const pdfDoc = await PDFLib.PDFDocument.load(bytes);

const pages = pdfDoc.getPages();

const angle = parseInt(document.getElementById("angle").value);

const mode = document.getElementById("mode").value;

let selected = [];

if(mode === "selected"){

selected = parsePages(
document.getElementById("pagesInput").value,
pages.length
);

if(selected.length === 0){
showStatus("Enter valid selected pages.");
return;
}

}

pages.forEach((page,index)=>{

const pageNo = index + 1;

if(mode === "all" || selected.includes(pageNo)){

const current = page.getRotation().angle || 0;

page.setRotation(
PDFLib.degrees(current + angle)
);

}

});

const outBytes = await pdfDoc.save();

const blob = new Blob([outBytes],{
type:"application/pdf"
});

const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "rotated-shreehub.pdf";

document.body.appendChild(a);
a.click();
a.remove();

URL.revokeObjectURL(url);

showStatus("✅ PDF rotated successfully. Download started.");

}catch(error){

console.error(error);
showStatus("❌ Could not rotate PDF.");

}

}

function resetTool(){

uploadedFile = null;
input.value = "";

document.getElementById("angle").value = "90";
document.getElementById("mode").value = "all";
document.getElementById("pagesInput").value = "";

updatePreview();

showStatus("Tool reset.");

}

updatePreview();
</script>
