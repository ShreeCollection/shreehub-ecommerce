<body>

<header>
<div class="navbar">

</ul>
</nav>
</div>
</header>

<div class="container">

<section class="hero">
<h1><span>Organize</span> PDF</h1>
<p class="sub">
Drag & drop reorder pages, remove unwanted pages and download arranged PDF instantly.
</p>
</section>

<div class="card">

<label class="upload">
<input type="file" id="pdfFile" accept="application/pdf">
📄 Click Here to Upload PDF File
</label>

<div class="toolbar">
<button class="btn primary" onclick="downloadPDF()">📥 Download Organized PDF</button>
<button class="btn dark" onclick="reversePages()">🔁 Reverse Order</button>
<button class="btn red" onclick="resetTool()">🗑 Reset</button>
</div>

<div class="status" id="status"></div>

<div class="grid" id="grid"></div>

<p class="note">
Tip: Drag any page card to new position. Remove pages you don't need.
</p>

</div>

<footer>
© 2026 ShreeHub Organize PDF Tool
</footer>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let uploadedBytes = null;
let sourcePdf = null;
let pagesData = [];
let dragIndex = null;

const input = document.getElementById("pdfFile");
const grid = document.getElementById("grid");
const statusBox = document.getElementById("status");

input.addEventListener("change", async function(){

const file = this.files[0];
if(!file) return;

uploadedBytes = await file.arrayBuffer();

showStatus("Loading PDF pages...");

try{

sourcePdf = await pdfjsLib.getDocument({
data:uploadedBytes
}).promise;

pagesData = [];

for(let i=1;i<=sourcePdf.numPages;i++){

const page = await sourcePdf.getPage(i);

const viewport = page.getViewport({scale:0.55});

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:ctx,
viewport:viewport
}).promise;

pagesData.push({
pageNo:i,
thumb:canvas.toDataURL("image/jpeg",0.9)
});

}

renderPages();

showStatus("PDF loaded successfully.");

}catch(error){

console.error(error);
showStatus("❌ Could not load PDF.");

}

});

function showStatus(text){

statusBox.style.display = "block";
statusBox.innerText = text;

}

function resetTool(){

uploadedBytes = null;
sourcePdf = null;
pagesData = [];
input.value = "";
grid.innerHTML = "";

showStatus("Tool reset.");

}
function renderPages(){

grid.innerHTML = "";

if(pagesData.length === 0){
grid.innerHTML =
"<p style='color:#94a3b8;'>No pages loaded.</p>";
return;
}

pagesData.forEach((item,index)=>{

grid.innerHTML += `
<div class="item"
draggable="true"
ondragstart="dragStart(${index})"
ondragover="allowDrop(event)"
ondrop="dropItem(${index})"
ondragend="dragEnd()">

<img src="${item.thumb}" class="thumb">

<div class="name">
Page ${item.pageNo}
</div>

<div class="actions">
<button class="small" onclick="moveLeft(${index})">⬅</button>
<button class="small" onclick="moveRight(${index})">➡</button>
<button class="small remove" onclick="removePage(${index})">✕</button>
</div>

</div>
`;

});

}

function dragStart(index){

dragIndex = index;

setTimeout(()=>{
document.querySelectorAll(".item")[index]
.classList.add("dragging");
},0);

}

function dragEnd(){

document
.querySelectorAll(".item")
.forEach(el=>el.classList.remove("dragging"));

}

function allowDrop(e){
e.preventDefault();
}

function dropItem(targetIndex){

if(dragIndex === null ||
dragIndex === targetIndex) return;

const moved = pagesData.splice(dragIndex,1)[0];

pagesData.splice(targetIndex,0,moved);

dragIndex = null;

renderPages();

}

function moveLeft(index){

if(index === 0) return;

[pagesData[index-1], pagesData[index]] =
[pagesData[index], pagesData[index-1]];

renderPages();

}

function moveRight(index){

if(index === pagesData.length-1) return;

[pagesData[index+1], pagesData[index]] =
[pagesData[index], pagesData[index+1]];

renderPages();

}

function removePage(index){

pagesData.splice(index,1);

renderPages();

showStatus("Page removed.");

}

function reversePages(){

pagesData.reverse();

renderPages();

showStatus("Pages reversed.");

}

async function downloadPDF(){

if(!uploadedBytes || pagesData.length === 0){
showStatus("Please upload PDF first.");
return;
}

try{

showStatus("Creating organized PDF...");

const srcDoc =
await PDFLib.PDFDocument.load(uploadedBytes);

const outDoc =
await PDFLib.PDFDocument.create();

for(const item of pagesData){

const [page] =
await outDoc.copyPages(
srcDoc,
[item.pageNo - 1]
);

outDoc.addPage(page);

}

const bytes =
await outDoc.save();

const blob = new Blob(
[bytes],
{type:"application/pdf"}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;
a.download =
"organized-shreehub.pdf";

document.body.appendChild(a);
a.click();
a.remove();

URL.revokeObjectURL(url);

showStatus(
"✅ Organized PDF downloaded."
);

}catch(error){

console.error(error);
showStatus(
"❌ Could not create PDF."
);

}

}
</script>
