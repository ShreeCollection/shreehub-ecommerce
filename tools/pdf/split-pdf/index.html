<header>

<div class="container">

<section class="hero">
<h1><span>Split</span> PDF Tool</h1>
<p class="sub">
Split PDF into single pages, custom ranges or selected pages instantly.
</p>
</section>

<div class="card">

<label class="upload">
<input type="file" id="pdfFile" accept="application/pdf">
📄 Click Here to Upload PDF File
</label>

<label>Split Mode</label>
<select id="mode">
<option value="single">Each Page Separate</option>
<option value="range">Custom Range</option>
<option value="selected">Selected Pages</option>
</select>

<div class="grid">

<div>
<label>Page Range (Example: 2-5)</label>
<input type="text" id="rangeInput" placeholder="2-5">
</div>

<div>
<label>Selected Pages (Example: 1,3,5)</label>
<input type="text" id="pagesInput" placeholder="1,3,5">
</div>

</div>

<div class="toolbar">
<button class="btn primary" onclick="splitPDF()">✂️ Split PDF</button>
<button class="btn dark" onclick="resetTool()">🔄 Reset</button>
</div>

<div class="status" id="status"></div>

<div class="results" id="results"></div>

<p class="note">
Choose a mode and download created split files instantly.
</p>

</div>

<footer>
© 2026 ShreeHub Split PDF Tool
</footer>

</div>

<script>
let uploadedFile = null;

const input = document.getElementById("pdfFile");
const statusBox = document.getElementById("status");
const results = document.getElementById("results");

input.addEventListener("change", function(){

uploadedFile = this.files[0];

if(uploadedFile){
showStatus("PDF uploaded successfully.");
}

});

function showStatus(text){

statusBox.style.display = "block";
statusBox.innerText = text;

}

function resetTool(){

uploadedFile = null;
input.value = "";
results.innerHTML = "";

document.getElementById("mode").value = "single";
document.getElementById("rangeInput").value = "";
document.getElementById("pagesInput").value = "";

showStatus("Tool reset.");

}

function parseSelected(text,total){

const set = new Set();

text.split(",").forEach(part=>{

let n = parseInt(part.trim());

if(n>=1 && n<=total){
set.add(n);
}

});

return [...set];

}
async function createDownloadCard(bytes,name,label){

const blob = new Blob(
[bytes],
{type:"application/pdf"}
);

const url = URL.createObjectURL(blob);

results.innerHTML += `
<div class="result">
<h4>${label}</h4>
<p>${name}</p>
<a href="${url}" download="${name}">
<button class="small">⬇ Download</button>
</a>
</div>
`;

}

async function splitPDF(){

if(!uploadedFile){
showStatus("Please upload a PDF file first.");
return;
}

try{

showStatus("Processing PDF... Please wait.");
results.innerHTML = "";

const bytes = await uploadedFile.arrayBuffer();

const sourcePdf = await PDFLib.PDFDocument.load(bytes);

const total = sourcePdf.getPageCount();

const mode =
document.getElementById("mode").value;

if(mode === "single"){

for(let i=0;i<total;i++){

const outPdf =
await PDFLib.PDFDocument.create();

const [page] =
await outPdf.copyPages(sourcePdf,[i]);

outPdf.addPage(page);

const outBytes =
await outPdf.save();

await createDownloadCard(
outBytes,
"page-" + (i+1) + ".pdf",
"Page " + (i+1)
);

}

showStatus("✅ Split into separate pages.");

}

else if(mode === "range"){

const range =
document.getElementById("rangeInput").value.trim();

if(!range.includes("-")){
showStatus("Enter valid range like 2-5.");
return;
}

let [start,end] =
range.split("-").map(Number);

if(
isNaN(start) ||
isNaN(end) ||
start < 1 ||
end > total ||
start > end
){
showStatus("Invalid range.");
return;
}

const outPdf =
await PDFLib.PDFDocument.create();

for(let i=start-1;i<=end-1;i++){

const [page] =
await outPdf.copyPages(sourcePdf,[i]);

outPdf.addPage(page);

}

const outBytes =
await outPdf.save();

await createDownloadCard(
outBytes,
"pages-" + start + "-to-" + end + ".pdf",
"Pages " + start + " to " + end
);

showStatus("✅ Range PDF created.");

}

else if(mode === "selected"){

const selected =
parseSelected(
document.getElementById("pagesInput").value,
total
);

if(selected.length === 0){
showStatus("Enter valid pages like 1,3,5.");
return;
}

const outPdf =
await PDFLib.PDFDocument.create();

for(const n of selected){

const [page] =
await outPdf.copyPages(sourcePdf,[n-1]);

outPdf.addPage(page);

}

const outBytes =
await outPdf.save();

await createDownloadCard(
outBytes,
"selected-pages.pdf",
"Selected Pages"
);

showStatus("✅ Selected pages PDF created.");

}

}catch(error){

console.error(error);
showStatus("❌ Could not split PDF.");

}

}
</script>
