<section class="hero">
<h1><span>PDF</span> to Image</h1>
<p class="sub">
Convert PDF pages to JPG or PNG images with quality options. Download pages individually.
</p>
</section>

<div class="card">

<label class="upload">
<input type="file" id="pdfFile" accept="application/pdf">
📄 Click Here to Upload PDF File
</label>

<div class="controls">

<div>
<label>Output Format</label>
<select id="format">
<option value="jpg">JPG</option>
<option value="png">PNG</option>
</select>
</div>

<div>
<label>Quality</label>
<select id="quality">
<option value="1">High</option>
<option value="0.8" selected>Balanced</option>
<option value="0.6">Medium</option>
<option value="0.4">Small Size</option>
</select>
</div>

<div>
<label>Render Scale</label>
<select id="scale">
<option value="1.2">Normal</option>
<option value="1.8" selected>Sharp</option>
<option value="2.5">HD</option>
</select>
</div>

</div>

<div class="toolbar">
<button class="btn primary" onclick="convertPDF()">🖼 Convert PDF</button>
<button class="btn dark" onclick="resetTool()">🔄 Reset</button>
</div>

<div class="status" id="status"></div>

<div class="grid" id="resultGrid"></div>

<p class="note">
Best for screenshots, sharing pages, extracting forms, product catalogs and previews.
</p>

</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let uploadedFile = null;

const input = document.getElementById("pdfFile");
const resultGrid = document.getElementById("resultGrid");
const statusBox = document.getElementById("status");

input.addEventListener("change", function(){

uploadedFile = this.files[0];

if(uploadedFile){
showStatus("PDF uploaded successfully.");
}

});

function showStatus(text){

statusBox.style.display = "block";
statusBox.innerText = text;

}

function resetTool(){

uploadedFile = null;
input.value = "";
resultGrid.innerHTML = "";
showStatus("Tool reset.");

}
async function convertPDF(){

if(!uploadedFile){
showStatus("Please upload a PDF file first.");
return;
}

try{

showStatus("Converting PDF pages... Please wait.");
resultGrid.innerHTML = "";

const bytes = await uploadedFile.arrayBuffer();

const pdf = await pdfjsLib.getDocument({
data:bytes
}).promise;

const format =
document.getElementById("format").value;

const quality = parseFloat(
document.getElementById("quality").value
);

const scale = parseFloat(
document.getElementById("scale").value
);

for(let i = 1; i <= pdf.numPages; i++){

const page = await pdf.getPage(i);

const viewport = page.getViewport({scale});

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:ctx,
viewport:viewport
}).promise;

let dataUrl;

if(format === "png"){
dataUrl = canvas.toDataURL("image/png");
}else{
dataUrl = canvas.toDataURL("image/jpeg",quality);
}

resultGrid.innerHTML += `
<div class="item">

<img src="${dataUrl}" class="thumb">

<div class="name">
Page ${i}.${format}
</div>

<div class="actions">
<a href="${dataUrl}" download="page-${i}.${format}">
<button class="small">⬇ Download</button>
</a>
</div>

</div>
`;

}

showStatus("✅ PDF converted successfully.");

}catch(error){

console.error(error);
showStatus("❌ Could not convert PDF.");

}

}
</script>
