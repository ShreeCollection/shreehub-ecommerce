<body>

<header>

</ul>
</nav>
</div>
</header>

<div class="container">

<section class="hero">
<h1><span>Image</span> to PDF</h1>
<p class="sub">
Convert JPG, PNG, WEBP images into one PDF file. Reorder images, add more files and download instantly.
</p>
</section>

<div class="card">

<label class="upload">
<input type="file" id="imageFiles" multiple accept="image/*">
🖼️ Click Here to Upload Images
</label>

<div class="toolbar">
<button class="btn primary" onclick="document.getElementById('imageFiles').click()">➕ Add More</button>
<button class="btn dark" onclick="sortAZ()">🔀 Sort A-Z</button>
<button class="btn red" onclick="clearAll()">🗑 Clear All</button>
<button class="btn primary" onclick="createPDF()">📄 Convert to PDF</button>
</div>

<div class="grid" id="imageGrid"></div>

<div class="status" id="status"></div>

<p class="note">
Best for photo albums, scanned pages, product images, invoices and documents.
</p>

</div>

<footer>
© 2026 ShreeHub Image to PDF Tool
</footer>

</div>

<script>
let files = [];

const input = document.getElementById("imageFiles");
const grid = document.getElementById("imageGrid");
const statusBox = document.getElementById("status");

input.addEventListener("change", function(){

const newFiles = Array.from(this.files);

files = [...files, ...newFiles];

files = files.filter((file,index,self)=>
index === self.findIndex(f =>
f.name === file.name &&
f.size === file.size
)
);

renderFiles();

this.value = "";

});

function showStatus(text){

statusBox.style.display = "block";
statusBox.innerText = text;

}

function renderFiles(){

grid.innerHTML = "";

if(files.length === 0){
grid.innerHTML = "<p style='color:#94a3b8;'>No images selected yet.</p>";
return;
}

files.forEach((file,index)=>{

const url = URL.createObjectURL(file);

grid.innerHTML += `
<div class="item">

<img src="${url}" class="thumb">

<div class="name">
${index + 1}. ${file.name}
</div>

<div class="actions">
<button class="small" onclick="moveUp(${index})">↑</button>
<button class="small" onclick="moveDown(${index})">↓</button>
<button class="small remove" onclick="removeFile(${index})">✕</button>
</div>

</div>
`;

});

}

function moveUp(index){

if(index === 0) return;

[files[index-1], files[index]] =
[files[index], files[index-1]];

renderFiles();

}

function moveDown(index){

if(index === files.length - 1) return;

[files[index+1], files[index]] =
[files[index], files[index+1]];

renderFiles();

}

function removeFile(index){

files.splice(index,1);
renderFiles();

}

function clearAll(){

files = [];
renderFiles();
showStatus("All images cleared.");

}

function sortAZ(){

files.sort((a,b)=>a.name.localeCompare(b.name));
renderFiles();
showStatus("Images sorted A-Z.");

}
async function createPDF(){

if(files.length === 0){
showStatus("Please upload images first.");
return;
}

try{

showStatus("Creating PDF... Please wait.");

const pdfDoc = await PDFLib.PDFDocument.create();

for(const file of files){

const bytes = await file.arrayBuffer();

let image;

if(
file.type.includes("png")
){
image = await pdfDoc.embedPng(bytes);
}else{
image = await pdfDoc.embedJpg(bytes);
}

const imgWidth = image.width;
const imgHeight = image.height;

/* Create page same size as image */
const page = pdfDoc.addPage([imgWidth,imgHeight]);

page.drawImage(image,{
x:0,
y:0,
width:imgWidth,
height:imgHeight
});

}

const pdfBytes = await pdfDoc.save();

const blob = new Blob(
[pdfBytes],
{type:"application/pdf"}
);

const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "images-shreehub.pdf";

document.body.appendChild(a);
a.click();
a.remove();

URL.revokeObjectURL(url);

showStatus("✅ PDF created successfully. Download started.");

}catch(error){

console.error(error);
showStatus("❌ Could not create PDF.");

}

}
</script>
